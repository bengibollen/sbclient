name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - global.json
      - sbclient.slnx
      - SbClient.Web/**
      - SbClient.Web.Tests/**
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - global.json
      - sbclient.slnx
      - SbClient.Web/**
      - SbClient.Web.Tests/**

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore sbclient.slnx
